<div class="container">
  <div class="container-fluid">
    <header class="title">Usuario</header>
    @if (loader()) {
      <div class="loader">
        <app-loader-component />
      </div>
    } @else {
      <div class="datos">
        <div class="item">
          <strong>Nombre: </strong>{{ dataUser()?.name }}
          <div class="icono"><mat-icon>create</mat-icon></div>
        </div>
        <div class="item">
          <strong>Correo: </strong> {{ dataUser()?.email }}
        </div>
        <div class="item">
          <strong>Empresa: </strong> {{ dataUser()?.idCompany }}
          <div class="icono"><mat-icon>create</mat-icon></div>
        </div>
      </div>
    }
  </div>
</div>
