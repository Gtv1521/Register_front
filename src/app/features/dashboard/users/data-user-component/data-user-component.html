<div class="container">
  <div class="navbar">
    <button class="btn" (click)="onVolver()">Volver</button>
    <h1>Datos del Usuario</h1>
  </div>
  <div class="container-fluid">
    <div class="options">
      <h2 class="title">Opciones</h2>
      <button class="opt" [routerLink]="['/user/data', user()!]" routerLinkActive="activebutton" type="button">
        <mat-icon>person</mat-icon>
        Ver Datos
      </button>
      <button class="opt" [routerLink]="['/user/sessions', user()!]" routerLinkActive="activebutton" type="button">
        <mat-icon>history</mat-icon>
        Ver Sesiones
      </button>
    </div>

    <div class="muestras">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
