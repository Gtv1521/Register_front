<!-- session de usuario  -->
<app-session-component />
@if (loader) {
  <app-loader-session-component />
} @else {
  <!-- componentes de dashboard -->
  <div class="container">
    <div class="container-fluid">
      <!-- componente de busqueda -->
      <mat-icon class="icons" (click)="busqueda = ''; onBuscar()"
        >delete</mat-icon
      >

      <div class="card-search">
        <div class="search-box">
          <input
            type="text"
            [(ngModel)]="busqueda"
            [placeholder]="
              filtroActual === 'todo'
                ? 'Buscar en todo'
                : filtroActual === 'En progreso'
                  ? 'Buscar en progreso'
                  : filtroActual === 'Completado'
                    ? 'Buscar en alertas'
                    : filtroActual === 'cancelado'
                      ? 'Buscar por código o registro'
                      : 'Buscar por cliente'
            "
            (keyup.enter)="onBuscar()"
          />
          <mat-icon class="search-icon" (click)="onBuscar()">search</mat-icon>
        </div>
      </div>

      <mat-icon class="icons">exit_to_app</mat-icon>
    </div>

    <!-- mapeo de registros -->
    <div class="content">
      <div class="registers">
        @for (registro of registrosFiltrados; track registro.id) {
          <app-card-component
            [registro]="registro"
            (verDetalleEvent)="verDetalle($event)"
          >
          </app-card-component>
        }
        @empty {
          <section class="no_data">
            <p>No hay registros</p>
          </section>
        } 
      </div>
    </div>

    <footer class="dashboard-footer">
      <!-- usuario logeado -->
      <div class="footer-left">
        <mat-icon class="user-icon">account_circle</mat-icon>
        <div class="user-info">
          <span class="user-name">{{ usuario?.name }}</span>
          <span class="user-role">Técnico</span>
        </div>
      </div>

      <div class="footer-center">
        <span class="system-name">Centro de Reparación Electrónica</span>
        <span class="system-version">v1.0.0</span>
      </div>

      <div class="footer-right">
        <!-- filtros del buscador -->
        <div class="filters">
          <div class="modos">
            <button
              [class.active]="filtroActual === 'todo'"
              (click)="cambiarFiltro('todo')"
            >
              Todo
            </button>

            <button
              [class.active]="filtroActual === 'En progreso'"
              (click)="cambiarFiltro('En progreso')"
            >
              En Progreso
            </button>

            <button
              [class.active]="filtroActual === 'Pendiente'"
              (click)="cambiarFiltro('Pendiente')"
            >
              Pendiente
            </button>

            <button
              [class.active]="filtroActual === 'Completado'"
              (click)="cambiarFiltro('Completado')"
            >
              Completado
            </button>

            <button
              [class.active]="filtroActual === 'cancelado'"
              (click)="cambiarFiltro('cancelado')"
            >
              Cancelado
            </button>
          </div>
        </div>
      </div>
    </footer>
  </div>
}
