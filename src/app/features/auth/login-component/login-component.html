<div class="contain">
  <form class="formulario" action="">
    <h3 class="title">Inicia session</h3>

    <div class="container-fluid">
      <section class="group-items">
        <label class="item_name" for="email">Email: </label>
        <input class="item_type" type="text" id="Email" placeholder="Email" />
      </section>

      <section class="group-items">
        <label class="item_name" for="password">Contraseña: </label>
        <input class="item_type" [type]="estado ? 'text' : 'password'" placeholder="*********"/>
      </section>

      <section class="options">
        <div class="view">
          <input (click)="togglePassword()" type="checkbox" name="show" id="show" />
          <label for="show">   Mostrar contraseña</label>
        </div>
        <div class="restore">¿Olvido su constraseña?</div>
      </section>

      <section class="exit">
        <input type="button" value="Entrar" />
      </section>
    </div>
  </form>
</div>
