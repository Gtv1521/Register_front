<div class="container">
  <div class="observation-create">
    <header class="header">
      <h2>Nueva observación</h2>
      <span class="register"> Registro #{{ IdRegister }} </span>
    </header>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
      <div class="panel_inputs">
        <!-- DESCRIPCIÓN -->
        <section class="descriptions">
          <!-- ESTADO -->
          <div class="field">
            <label>Estado</label>
            <select formControlName="type">
              <option selected value="PENDIENTE">Pendiente</option>
              <option value="EN_PROCESO">En proceso</option>
              <option value="COMPLETADO">Completado</option>
              <option value="CANCELADO">Cancelado</option>
            </select>
          </div>

          <div class="field">
            <label for="description">Descripción</label>
            <textarea
              id="description"
              formControlName="description"
              placeholder="Describe la observación realizada..."
            >
            </textarea>

            @if (
              form.controls.description.touched &&
              form.controls.description.invalid
            ) {
              <small class="error">
                La descripción es obligatoria (mínimo 10 caracteres)
              </small>
            }
          </div>
        </section>

        <section class="notify">
          <!-- Checks de envio a redes -->
          <div class="checkbox-group">
            <h3 class="title_notify">Notificación</h3>
            <div class="notify_panel">
              <div class="form_group">
                <input
                  id="correo"
                  type="checkbox"
                  formControlName="notificaEmail"
                />
                <label for="correo"> Correo </label>
              </div>

              <div class="form_group">
                <input
                  id="chat"
                  type="checkbox"
                  formControlName="notificaWhatsapp"
                />
                <label for="chat"> WhatsApp </label>
              </div>
            </div>
          </div>

          <!-- Imagenes -->
          <div class="photo-upload">
            <h3>Evidencias</h3>
            <div class="photo-preview">
              @for (photo of photoPreviews; track photo) {
                <img [src]="photo" alt="preview" (click)="removePhoto(photoPreviews.indexOf(photo))" />
              }
            </div>
            <label class="upload-btn">
              <mat-icon>photo_camera</mat-icon>
              Agregar fotos
              <input
                type="file"
                accept="image/*"
                multiple
                hidden
                (change)="onPhotosSelected($event)"
              />
            </label>
          </div>
        </section>
      </div>
      <!-- ACCIONES -->
      <div class="actions">
        <button type="button" class="btn-cancel" (click)="cancelar()">
          Cancelar
        </button>

        <button type="submit" class="btn-save" [disabled]="form.invalid || loader">
          <div class="data_save">
            @if (loader) {
              <span class="icon">
                <svg
                  version="1.1"
                  xmlns="http://www.w3.org/2000/svg"
                  xmlns:xlink="http://www.w3.org/1999/xlink"
                  x="0px"
                  y="0px"
                  viewBox="0 0 2400 2400"
                  xml:space="preserve"
                >
                  <g
                    stroke-width="200"
                    stroke-linecap="round"
                    stroke="currentColor"
                    fill="none"
                    id="spinner"
                  >
                    <line x1="1200" y1="600" x2="1200" y2="100" />
                    <line opacity="0.5" x1="1200" y1="2300" x2="1200" y2="1800" />
                    <line
                      opacity="0.917"
                      x1="900"
                      y1="680.4"
                      x2="650"
                      y2="247.4"
                    />
                    <line
                      opacity="0.417"
                      x1="1750"
                      y1="2152.6"
                      x2="1500"
                      y2="1719.6"
                    />
                    <line
                      opacity="0.833"
                      x1="680.4"
                      y1="900"
                      x2="247.4"
                      y2="650"
                    />
                    <line
                      opacity="0.333"
                      x1="2152.6"
                      y1="1750"
                      x2="1719.6"
                      y2="1500"
                    />
                    <line opacity="0.75" x1="600" y1="1200" x2="100" y2="1200" />
                    <line
                      opacity="0.25"
                      x1="2300"
                      y1="1200"
                      x2="1800"
                      y2="1200"
                    />
                    <line
                      opacity="0.667"
                      x1="680.4"
                      y1="1500"
                      x2="247.4"
                      y2="1750"
                    />
                    <line
                      opacity="0.167"
                      x1="2152.6"
                      y1="650"
                      x2="1719.6"
                      y2="900"
                    />
                    <line
                      opacity="0.583"
                      x1="900"
                      y1="1719.6"
                      x2="650"
                      y2="2152.6"
                    />
                    <line
                      opacity="0.083"
                      x1="1750"
                      y1="247.4"
                      x2="1500"
                      y2="680.4"
                    />
                    <animateTransform
                      attributeName="transform"
                      attributeType="XML"
                      type="rotate"
                      keyTimes="0;0.08333;0.16667;0.25;0.33333;0.41667;0.5;0.58333;0.66667;0.75;0.83333;0.91667"
                      values="0 1199 1199;30 1199 1199;60 1199 1199;90 1199 1199;120 1199 1199;150 1199 1199;180 1199 1199;210 1199 1199;240 1199 1199;270 1199 1199;300 1199 1199;330 1199 1199"
                      dur="0.83333s"
                      begin="0s"
                      repeatCount="indefinite"
                      calcMode="discrete"
                    />
                  </g>
                </svg>
              </span>
            }
            <p>Guardar</p>
          </div>
        </button>
      </div>
    </form>
  </div>
</div>
