<div class="container">
  <div class="card-observation">
    <!-- LADO IZQUIERDO -->
    <div class="panel_left">
      <div class="container_description">
        <h2 class="title">Detalles</h2>
        <div class="description" [innerHTML]="textoFormateado">
        </div>
        <p class="date">
          Fecha:
          {{ Observation.createdAt | date: "EEEE, d MMMM yyyy HH:mm" }}
        </p>
      </div>
    </div>

    <!-- LADO DERECHO -->
    <div class="right-panel">
      <!-- BOTONES -->
      <div class="buttons">
        <button class="boton editar">
          <span><mat-icon>edit</mat-icon> </span>
        </button>
        <button class="boton eliminar">
          <span>
            <mat-icon>delete</mat-icon>
          </span>
        </button>
      </div>

      <!-- GALERÍA -->
      <div class="photos">
        <h3>Evidencias:</h3>
        <div class="photo-list">
          @for (photo of Observation.photos; track photo.id) {
            <img
              [src]="photo.photo"
              [id]="photo.id"
              class="observation-photo"
            />
          }
        </div>
      </div>
    </div>
  </div>
</div>
