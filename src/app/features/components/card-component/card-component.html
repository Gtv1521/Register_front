<div class="card">
  <div class="card-header">
    <h3>{{ registro?.cliente?.name }}</h3>
  </div>
  <div class="card-body">
    <img class="imagen" [src]="registro?.observaciones?.photos?.[0]?.url">
    <p><strong>Estado:</strong> {{ registro?.registro?.status }}</p>
    <p><strong>Descripción:</strong> {{ registro?.observaciones?.description }}</p>
  </div>
  <div class="card-footer">
    <button class="btn btn-secondary" (click)="verDetalle(registro?.observaciones?.id)">
      Ver detalle
    </button>
    <button class="btn btn-primary" (click)="crearObservacion(registro?.registro?.id)">
      Nueva observación
    </button>
  </div>
</div>
